name: Auto Update Predictions

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml
          
      - name: Run prediction update
        run: |
          cd cup2026predictor
          python -m src.update --sims 300000 --workers 1
          
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto update predictions $(date +'%Y-%m-%d %H:%M')" || true
            git push || echo "Push skipped (no changes or remote rejection)"
          fi
          
      - name: Check Cloudflare deployment
        run: |
          echo "Checking Cloudflare deployment configuration..."
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is not set"
          else
            echo "CLOUDFLARE_API_TOKEN is configured"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID is not set"
          else
            echo "CLOUDFLARE_ACCOUNT_ID is configured"
          fi
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: simulacrum
          directory: cup2026predictor/web
        timeout-minutes: 10
        continue-on-error: true
