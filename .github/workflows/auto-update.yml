name: Auto Update Predictions

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml
          
      - name: Run prediction update
        run: |
          cd cup2026predictor
          python -m src.update --sims 300000 --workers 1
          echo "Checking generated files..."
          ls -la web/predictor-data.js
          ls -la web/data.js
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto update predictions $(date +'%Y-%m-%d %H:%M')"
            git push || echo "WARNING: Git push failed"
            echo "SUCCESS: Changes pushed to GitHub"
          else
            echo "No changes to commit, skipping deployment"
            exit 0
          fi
          
      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cup2026predictor/web --project-name=simulacrum --branch=main
        timeout-minutes: 10
