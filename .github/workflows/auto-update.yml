name: Auto Update Predictions

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/auto-update.yml'
      - 'cup2026predictor/src/**'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: Run prediction update
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          cd cup2026predictor
          if [ -n "$LLM_API_KEY" ]; then
            mkdir -p data
            echo '{"llm":{"base_url":"'${LLM_BASE_URL:-https://apihub.agnes-ai.com/v1}'","api_key":"'${LLM_API_KEY}'","model":"'${LLM_MODEL:-agnes-2.0-flash}'"}}' > data/config.json
            echo "LLM config written successfully"
          else
            echo "WARNING: No LLM_API_KEY secret found, AI blurbs will not be generated"
          fi
          python -m src.update --sims 300000 --workers 1
          echo "Files generated:"
          ls -la web/predictor-data.js web/data.js web/blurbs.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Auto update predictions $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin main
            echo "Changes pushed successfully"
          else
            echo "No changes to commit"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cup2026predictor/web --project-name=simulacrum
